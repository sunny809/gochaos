version: "2"
run:
  timeout: 10m
  go: "1.23"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - prealloc
    - gocritic
    - misspell
    - revive
    - forcetypeassert
    - thelper
    - usestdlibvars
    - gocyclo
    - musttag
    - exhaustive
    - wrapcheck
    - durationcheck
    - nilnil
    - decorder
    - testpackage
    - tparallel
    - gocognit
    - gochecknoinits
  settings:
    govet:
      disable:
        - shadow
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - fmt.Errorf(
    decorder:
      disable-dec-order-check: false
      disable-init-func-first-check: false
      disable-dec-num-check: false

formatters:
  enable:
    - gofmt
    - goimports
