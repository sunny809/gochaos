run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - prealloc
    - gocritic
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
